<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TG Music Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #121212);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --accent-color: #1db954; /* Spotify Green */
            --secondary-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; height: 100vh;
        }

        .search-container { margin-bottom: 15px; }
        #search-input {
            width: 100%; padding: 12px; border-radius: 20px;
            border: none; background: var(--secondary-bg); color: white;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { 
            padding: 8px 15px; border-radius: 15px; cursor: pointer; 
            background: var(--secondary-bg); font-size: 14px;
        }
        .tab.active { background: var(--accent-color); }

        #main-content { flex-grow: 1; overflow-y: auto; padding-bottom: 100px; }

        .track-item {
            display: flex; align-items: center; padding: 10px;
            border-bottom: 1px solid #333;
        }
        .track-thumb { width: 45px; height: 45px; border-radius: 5px; margin-right: 12px; }
        .track-info { flex-grow: 1; }
        .add-btn { background: none; border: none; color: var(--accent-color); font-size: 20px; cursor: pointer; }

        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #282828; padding: 10px 15px;
            display: none; align-items: center; justify-content: space-between;
        }
        .player-bar.active { display: flex; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Поиск в YouTube...">
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-search" onclick="switchTab('search')">Поиск</div>
        <div class="tab" id="tab-playlist" onclick="switchTab('playlist')">Плейлист ❤️</div>
    </div>

    <div id="main-content">
        <div id="results-list"></div>
        <div id="playlist-list" style="display: none;"></div>
    </div>

    <div id="yt-player"></div>

    <div class="player-bar" id="player-bar">
        <div id="current-title" style="font-size: 13px; max-width: 70%;"></div>
        <button onclick="togglePlay()" id="play-btn" style="background:none; border:none; color:white; font-size:24px;">⏸</button>
    </div>

    <script>
        const YOUTUBE_API_KEY = 'AIzaSyBXH_K-qTz_SfzupTeRfYUATc5d_wOzaV4'; 
        let ytPlayer;
        let isPlaying = false;
        let currentTab = 'search';
        
        // Массив для плейлиста
        let myPlaylist = JSON.parse(localStorage.getItem('myPlaylist')) || [];

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: '',
                events: { 'onReady': loadLastTrack }
            });
        }

        // Сохранение последнего трека
        function saveLastTrack(id, title) {
            localStorage.setItem('lastTrackId', id);
            localStorage.setItem('lastTrackTitle', title);
        }

        // Загрузка последнего трека при входе
        function loadLastTrack() {
            const id = localStorage.getItem('lastTrackId');
            const title = localStorage.getItem('lastTrackTitle');
            if (id) {
                document.getElementById('current-title').innerText = "Ранее: " + title;
                document.getElementById('player-bar').classList.add('active');
                ytPlayer.cueVideoById(id); // Подготавливает, но не играет сразу
            }
        }

        async function searchMusic(query) {
            const list = document.getElementById('results-list');
            list.innerHTML = 'Загрузка...';
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoCategoryId=10&maxResults=10&key=${YOUTUBE_API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            list.innerHTML = '';
            data.items.forEach(item => renderTrack(item, list, true));
        }

        function renderTrack(item, container, isSearch) {
            const videoId = isSearch ? item.id.videoId : item.id;
            const title = isSearch ? item.snippet.title : item.title;
            const thumb = isSearch ? item.snippet.thumbnails.default.url : item.thumb;

            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <img src="${thumb}" class="track-thumb" onclick="playTrack('${videoId}', '${title.replace(/'/g, "")}')">
                <div class="track-info" onclick="playTrack('${videoId}', '${title.replace(/'/g, "")}')">
                    <div style="font-weight:bold; font-size:14px;">${title}</div>
                </div>
                ${isSearch ? `<button class="add-btn" onclick="addToPlaylist('${videoId}', '${title.replace(/'/g, "")}', '${thumb}')">+</button>` : 
                `<button class="add-btn" style="color:red" onclick="removeFromPlaylist('${videoId}')">×</button>`}
            `;
            container.appendChild(div);
        }

        function playTrack(id, title) {
            ytPlayer.loadVideoById(id);
            ytPlayer.playVideo();
            isPlaying = true;
            document.getElementById('current-title').innerText = title;
            document.getElementById('player-bar').classList.add('active');
            document.getElementById('play-btn').innerText = '⏸';
            saveLastTrack(id, title);
        }

        function addToPlaylist(id, title, thumb) {
            if (!myPlaylist.find(t => t.id === id)) {
                myPlaylist.push({id, title, thumb});
                localStorage.setItem('myPlaylist', JSON.stringify(myPlaylist));
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }

        function removeFromPlaylist(id) {
            myPlaylist = myPlaylist.filter(t => t.id !== id);
            localStorage.setItem('myPlaylist', JSON.stringify(myPlaylist));
            renderPlaylist();
        }

        function renderPlaylist() {
            const list = document.getElementById('playlist-list');
            list.innerHTML = myPlaylist.length ? '' : '<p style="text-align:center">Плейлист пуст</p>';
            myPlaylist.forEach(track => renderTrack(track, list, false));
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-search').classList.toggle('active', tab === 'search');
            document.getElementById('tab-playlist').classList.toggle('active', tab === 'playlist');
            document.getElementById('results-list').style.display = tab === 'search' ? 'block' : 'none';
            document.getElementById('playlist-list').style.display = tab === 'playlist' ? 'block' : 'none';
            if (tab === 'playlist') renderPlaylist();
        }

        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter') searchMusic(e.target.value);
        };

        function togglePlay() {
            if (isPlaying) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
            isPlaying = !isPlaying;
            document.getElementById('play-btn').innerText = isPlaying ? '⏸' : '▶️';
        }
    </script>
</body>
</html>
