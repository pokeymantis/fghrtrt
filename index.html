<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TG Music Cloud</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://w.soundcloud.com/player/api.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #ff5500; /* Фирменный оранжевый SoundCloud */
            --secondary-bg: #1e1e1e;
        }
        body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; }
        #search-input { width: 100%; padding: 12px; border-radius: 20px; border: none; background: var(--secondary-bg); color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { padding: 8px 15px; border-radius: 15px; cursor: pointer; background: var(--secondary-bg); font-size: 14px; }
        .tab.active { background: var(--accent-color); }

        #main-content { flex-grow: 1; overflow-y: auto; padding-bottom: 140px; }
        .track-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        .track-thumb { width: 45px; height: 45px; border-radius: 5px; margin-right: 12px; object-fit: cover; }
        .track-info { flex-grow: 1; }
        .add-btn { background: none; border: none; color: var(--accent-color); font-size: 24px; cursor: pointer; padding: 0 10px; }

        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #282828; padding: 15px;
            display: none; flex-direction: column;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .player-bar.active { display: flex; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 10px; }
        .controls button { background: none; border: none; color: white; font-size: 30px; cursor: pointer; }
        
        /* Скрытый виджет для проигрывания */
        #sc-iframe { position: absolute; top: -9999px; }
    </style>
</head>
<body>

    <input type="text" id="search-input" placeholder="Поиск в SoundCloud...">
    
    <div class="tabs">
        <div class="tab active" id="tab-search" onclick="switchTab('search')">Поиск</div>
        <div class="tab" id="tab-playlist" onclick="switchTab('playlist')">Любимое ❤️</div>
    </div>

    <div id="main-content">
        <div id="results-list"></div>
        <div id="playlist-list" style="display: none;"></div>
    </div>

    <iframe id="sc-iframe" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293"></iframe>

    <div class="player-bar" id="player-bar">
        <div id="current-title" style="font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
        <div class="controls">
            <button onclick="widget.prev()">⏮</button>
            <button onclick="togglePlay()" id="play-btn">▶️</button>
            <button onclick="widget.next()">⏭</button>
        </div>
    </div>

    <script>
        // Публичный Client ID (иногда их нужно обновлять)
        const SC_CLIENT_ID = 'iZIs4mchue783BnuParD0ZduubtRHn7W'; 
        
        const tg = window.Telegram.WebApp;
        const widget = SC.Widget(document.getElementById('sc-iframe'));
        let isPlaying = false;
        let myPlaylist = JSON.parse(localStorage.getItem('myPlaylist')) || [];

        tg.expand();

        // Поиск через публичный API SoundCloud
        async function searchMusic(query) {
            const list = document.getElementById('results-list');
            list.innerHTML = 'Ищу треки...';
            
            try {
                // Используем поисковый эндпоинт SoundCloud
                const response = await fetch(`https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(query)}&client_id=${SC_CLIENT_ID}&limit=15`);
                const data = await response.json();

                list.innerHTML = '';
                data.collection.forEach(track => {
                    renderTrack(track, list, true);
                });
            } catch (e) {
                list.innerHTML = 'Ошибка поиска. Возможно, нужно обновить Client ID.';
                console.error(e);
            }
        }

        function renderTrack(track, container, isSearch) {
            const div = document.createElement('div');
            div.className = 'track-item';
            const thumb = track.artwork_url || track.user.avatar_url || 'https://via.placeholder.com/45';
            
            div.innerHTML = `
                <img src="${thumb}" class="track-thumb" onclick="playTrack('${track.permalink_url}', '${track.title.replace(/'/g, "")}')">
                <div class="track-info" onclick="playTrack('${track.permalink_url}', '${track.title.replace(/'/g, "")}')">
                    <div style="font-size:14px; font-weight:bold;">${track.title}</div>
                    <div style="font-size:12px; color:#aaa;">${track.user.username}</div>
                </div>
                ${isSearch ? `<button class="add-btn" onclick="addToPlaylist('${track.permalink_url}', '${track.title.replace(/'/g, "")}', '${thumb}')">+</button>` : ''}
            `;
            container.appendChild(div);
        }

        function playTrack(url, title) {
            widget.load(url, {
                auto_play: true,
                hide_related: true,
                show_comments: false,
                callback: () => {
                    document.getElementById('current-title').innerText = title;
                    document.getElementById('player-bar').classList.add('active');
                    isPlaying = true;
                    document.getElementById('play-btn').innerText = '⏸';
                }
            });
        }

        function togglePlay() {
            widget.toggle();
            isPlaying = !isPlaying;
            document.getElementById('play-btn').innerText = isPlaying ? '⏸' : '▶️';
        }

        // Плейлист (LocalStorage)
        function addToPlaylist(url, title, thumb) {
            if (!myPlaylist.find(t => t.url === url)) {
                myPlaylist.push({url, title, thumb});
                localStorage.setItem('myPlaylist', JSON.stringify(myPlaylist));
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function switchTab(tab) {
            document.getElementById('results-list').style.display = tab === 'search' ? 'block' : 'none';
            document.getElementById('playlist-list').style.display = tab === 'playlist' ? 'block' : 'none';
            document.getElementById('tab-search').classList.toggle('active', tab === 'search');
            document.getElementById('tab-playlist').classList.toggle('active', tab === 'playlist');
            
            if (tab === 'playlist') {
                const list = document.getElementById('playlist-list');
                list.innerHTML = myPlaylist.length ? '' : '<p style="text-align:center">Тут пока пусто</p>';
                myPlaylist.forEach(t => renderTrack({permalink_url: t.url, title: t.title, artwork_url: t.thumb, user: {username: ''}}, list, false));
            }
        }

        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter') searchMusic(e.target.value);
        };

        // Слушаем события плеера для автопереключения
        widget.bind(SC.Widget.Events.FINISH, () => {
            // Здесь можно добавить логику переключения на следующий трек из очереди
            console.log('Трек закончился');
        });

    </script>
</body>
</html>
