<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TG Music Proxy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Оставляем тот же красивый дизайн, что был раньше */
        :root { --bg-color: #121212; --text-color: #ffffff; --accent-color: #1db954; --secondary-bg: #1e1e1e; }
        body { background: var(--bg-color); color: var(--text-color); font-family: sans-serif; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; }
        #search-input { width: 100%; padding: 12px; border-radius: 20px; border: none; background: var(--secondary-bg); color: white; margin-bottom: 10px; box-sizing: border-box; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { padding: 8px 15px; border-radius: 15px; cursor: pointer; background: var(--secondary-bg); font-size: 14px; }
        .tab.active { background: var(--accent-color); }
        #main-content { flex-grow: 1; overflow-y: auto; padding-bottom: 140px; }
        .track-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .track-thumb { width: 45px; height: 45px; border-radius: 5px; margin-right: 12px; }
        .track-info { flex-grow: 1; }
        .add-btn { background: none; border: none; color: var(--accent-color); font-size: 20px; cursor: pointer; }
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #282828; padding: 15px; display: none; flex-direction: column; z-index: 100; }
        .player-bar.active { display: flex; }
        .progress-container { display: flex; align-items: center; gap: 10px; width: 100%; margin: 10px 0; }
        #progress-bar { flex-grow: 1; accent-color: var(--accent-color); }
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; }
        .controls button { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <input type="text" id="search-input" placeholder="Поиск музыки (без VPN)...">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('search')">Поиск</div>
        <div class="tab" onclick="switchTab('playlist')">Плейлист ❤️</div>
    </div>

    <div id="main-content">
        <div id="results-list"></div>
        <div id="playlist-list" style="display: none;"></div>
    </div>

    <audio id="audio-engine"></audio>

    <div class="player-bar" id="player-bar">
        <div id="current-title" style="font-size: 14px; font-weight: bold; margin-bottom: 5px;"></div>
        <div class="progress-container">
            <span id="current-time" style="font-size:12px">0:00</span>
            <input type="range" id="progress-bar" value="0" min="0" max="100">
            <span id="total-time" style="font-size:12px">0:00</span>
        </div>
        <div class="controls">
            <button onclick="playPrev()">⏮</button>
            <button onclick="togglePlay()" id="play-btn">▶️</button>
            <button onclick="playNext()">⏭</button>
        </div>
    </div>

    <script>
        const YOUTUBE_API_KEY = 'AIzaSyBXH_K-qTz_SfzupTeRfYUATc5d_wOzaV4'; 
        const INVIDIOUS_INSTANCES = [
            'https://inv.nadeko.net/',
            'https://invidious.nerdvpn.de/',
            'https://yewtu.be/'
        ];
        let currentInstance = INVIDIOUS_INSTANCES[0];

        const audio = document.getElementById('audio-engine');
        let isPlaying = false;
        let myPlaylist = JSON.parse(localStorage.getItem('myPlaylist')) || [];
        let currentQueue = [];
        let currentIndex = -1;

        // Инициализация Telegram
        window.Telegram.WebApp.expand();

        // Поиск (оставляем через официальный API YouTube для точности)
        async function searchMusic(query) {
    const list = document.getElementById('results-list');
    list.innerHTML = 'Загрузка...';
    try {
        // Ищем через API Invidious вместо Google
        const res = await fetch(`${currentInstance}/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
        const data = await res.json();
        
        list.innerHTML = '';
        currentQueue = data.map(item => ({
            id: item.videoId,
            title: item.title,
            thumb: item.videoThumbnails.find(t => t.quality === 'default')?.url || item.videoThumbnails[0].url
        }));
        
        currentQueue.forEach((t, i) => renderTrack(t, list, i, true));
    } catch (e) {
        list.innerHTML = 'Ошибка поиска на сервере Invidious. Попробуйте позже.';
    }
        }

        async function playTrack(id, title) {
            document.getElementById('current-title').innerText = "Загрузка потока...";
            document.getElementById('player-bar').classList.add('active');

            // Получаем прямую ссылку на аудио через Invidious
            try {
                const res = await fetch(`${currentInstance}/api/v1/videos/${id}`);
                const data = await res.json();
                
                // Ищем формат "audio/googlevideo" или просто самый легкий поток
                const audioUrl = `${currentInstance}/latest_version?id=${id}&itag=140`; // itag 140 это обычно M4A аудио
                
                audio.src = audioUrl;
                audio.play();
                
                document.getElementById('current-title').innerText = title;
                isPlaying = true;
                updatePlayBtn();
                
                localStorage.setItem('lastTrackId', id);
                localStorage.setItem('lastTrackTitle', title);
            } catch (e) {
                document.getElementById('current-title').innerText = "Ошибка сервера. Пробую другой...";
                // Здесь можно добавить логику переключения instance
            }
        }

        // Логика управления аудио
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').value = pct || 0;
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-time').innerText = formatTime(audio.duration || 0);
        };

        audio.onended = () => playNext();

        document.getElementById('progress-bar').oninput = function() {
            audio.currentTime = (this.value / 100) * audio.duration;
        };

        function togglePlay() {
            if (audio.paused) audio.play(); else audio.pause();
            isPlaying = !audio.paused;
            updatePlayBtn();
        }

        function updatePlayBtn() {
            document.getElementById('play-btn').innerText = isPlaying ? '⏸' : '▶️';
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Функции навигации (Next/Prev) — такие же как в прошлом коде
        function playAtIndex(index, fromSearch) {
            if (!fromSearch) currentQueue = myPlaylist;
            currentIndex = index;
            const track = currentQueue[currentIndex];
            playTrack(track.id, track.title);
        }

        function playNext() { if (currentIndex < currentQueue.length - 1) playAtIndex(currentIndex + 1, currentQueue !== myPlaylist); }
        function playPrev() { if (currentIndex > 0) playAtIndex(currentIndex - 1, currentQueue !== myPlaylist); }

        function renderTrack(track, container, index, isSearch) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <img src="${track.thumb}" class="track-thumb" onclick="playAtIndex(${index}, ${isSearch})">
                <div class="track-info" onclick="playAtIndex(${index}, ${isSearch})">
                    <div style="font-size:14px;">${track.title}</div>
                </div>
                ${isSearch ? `<button class="add-btn" onclick="addToPlaylist('${track.id}', '${track.title.replace(/'/g,"")}', '${track.thumb}')">+</button>` : ''}
            `;
            container.appendChild(div);
        }

        function addToPlaylist(id, title, thumb) {
            if (!myPlaylist.find(t => t.id === id)) {
                myPlaylist.push({id, title, thumb});
                localStorage.setItem('myPlaylist', JSON.stringify(myPlaylist));
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('results-list').style.display = tab === 'search' ? 'block' : 'none';
            document.getElementById('playlist-list').style.display = tab === 'playlist' ? 'block' : 'none';
            if (tab === 'playlist') {
                const list = document.getElementById('playlist-list');
                list.innerHTML = '';
                myPlaylist.forEach((t, i) => renderTrack(t, list, i, false));
            }
        }

        document.getElementById('search-input').onkeypress = (e) => { if (e.key === 'Enter') searchMusic(e.target.value); };
    </script>
</body>
</html>
